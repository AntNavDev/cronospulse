services:
    app:
        container_name: cronospulse_app
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        restart: unless-stopped
        working_dir: /var/www/html
        volumes:
            - .:/var/www/html
        networks:
            - cronospulse_network
        depends_on:
            mysql:
                condition: service_healthy
            redis:
                condition: service_healthy

    scheduler:
        container_name: cronospulse_scheduler
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        restart: unless-stopped
        command: ["php", "artisan", "schedule:work"]
        volumes:
            - .:/var/www/html
        networks:
            - cronospulse_network
        depends_on:
            mysql:
                condition: service_healthy

    nginx:
        container_name: cronospulse_nginx
        image: 'nginx:alpine'
        restart: unless-stopped
        volumes:
            - .:/var/www/html:ro
            - './docker/nginx/cronospulse.conf:/etc/nginx/conf.d/default.conf:ro'
            - './docker/nginx/rate-limit.conf:/etc/nginx/conf.d/rate-limit.conf:ro'
        networks:
            - cronospulse_network
            - proxy
        depends_on:
            - app

    mysql:
        container_name: cronospulse_mysql
        image: 'mysql:8.4'
        restart: unless-stopped
        environment:
            MYSQL_ROOT_PASSWORD: '${DB_ROOT_PASSWORD}'
            MYSQL_DATABASE: '${DB_DATABASE}'
            MYSQL_USER: '${DB_USERNAME}'
            MYSQL_PASSWORD: '${DB_PASSWORD}'
        volumes:
            - 'cronospulse_mysql_data:/var/lib/mysql'
            - './docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro'
        networks:
            - cronospulse_network
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-p${DB_PASSWORD}"]
            retries: 5
            timeout: 5s
            interval: 10s

    redis:
        container_name: cronospulse_redis
        image: 'redis:7-alpine'
        restart: unless-stopped
        command: redis-server --appendonly yes
        volumes:
            - 'cronospulse_redis_data:/data'
        networks:
            - cronospulse_network
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            retries: 3
            timeout: 5s
            interval: 10s

networks:
    cronospulse_network:
        name: cronospulse_network
        driver: bridge
    proxy:
        external: true

volumes:
    cronospulse_mysql_data:
        driver: local
    cronospulse_redis_data:
        driver: local